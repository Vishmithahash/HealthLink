apiVersion: v1
kind: List
items:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: auth-service-config
    data:
      ACCESS_TOKEN_EXPIRES_IN: "15m"
      REFRESH_TOKEN_EXPIRES_IN: "7d"
      BCRYPT_SALT_ROUNDS: "12"
      CORS_ORIGIN: "http://localhost:3000"
  - apiVersion: v1
    kind: Secret
    metadata:
      name: auth-service-secret
    type: Opaque
    stringData:
      MONGODB_URI: "mongodb://mongo:27017/auth-db"
      JWT_ACCESS_SECRET: "access_secret_123456789_secure_key_service"
      JWT_REFRESH_SECRET: "refresh_secret_987654321_secure_key_service"
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: appointment-service-config
    data:
      CORS_ORIGIN: "http://localhost:3000"
      REQUEST_TIMEOUT_MS: "5000"
      DOCTOR_SERVICE_URL: "http://doctor-service"
      PAYMENT_SERVICE_URL: "http://payment-service:3004"
      NOTIFICATION_SERVICE_URL: "http://notification-service:3005"
  - apiVersion: v1
    kind: Secret
    metadata:
      name: appointment-service-secret
    type: Opaque
    stringData:
      MONGODB_URI: "mongodb://mongo:27017/appointment-db"
      JWT_ACCESS_SECRET: "access_secret_123456789_secure_key_service"
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: doctor-service-config
    data:
      PORT: "4002"
      CORS_ORIGIN: "http://localhost:3000"
      APPOINTMENT_SERVICE_URL: "http://appointment-service"
      PATIENT_SERVICE_URL: "http://patient-service"
      TELEMEDICINE_SERVICE_URL: "http://telemedicine-service"
      TELEMEDICINE_JOIN_BASE_URL: "https://telemedicine.healthlink.local/session"
      NOTIFICATION_SERVICE_URL: "http://notification-service"
      REQUEST_TIMEOUT_MS: "5000"
  - apiVersion: v1
    kind: Secret
    metadata:
      name: doctor-service-secret
    type: Opaque
    stringData:
      MONGODB_URI: "mongodb://mongo:27017/doctor-db"
      JWT_ACCESS_SECRET: "access_secret_123456789_secure_key_service"
      JWT_SECRET: "your_super_secret_jwt_key_here"
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: patient-service-config
    data:
      PORT: "4003"
      CORS_ORIGIN: "http://localhost:3000"
      MAX_REPORT_SIZE_MB: "10"
  - apiVersion: v1
    kind: Secret
    metadata:
      name: patient-service-secret
    type: Opaque
    stringData:
      MONGODB_URI: "mongodb://mongo:27017/patient-db"
      JWT_ACCESS_SECRET: "access_secret_123456789_secure_key_service"
      JWT_SECRET: "your_super_secret_jwt_key_here"

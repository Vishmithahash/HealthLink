apiVersion: v1
kind: List
items:
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: auth-service-config
    data:
      ACCESS_TOKEN_EXPIRES_IN: "15m"
      REFRESH_TOKEN_EXPIRES_IN: "7d"
      BCRYPT_SALT_ROUNDS: "12"
      CORS_ORIGIN: "http://localhost:3000"
  - apiVersion: v1
    kind: Secret
    metadata:
      name: auth-service-secret
    type: Opaque
    stringData:
      MONGODB_URI: "mongodb://mongo:27017/auth-db"
      JWT_ACCESS_SECRET: "access_secret_123456789_secure_key_service"
      JWT_REFRESH_SECRET: "refresh_secret_987654321_secure_key_service"
  - apiVersion: v1
    kind: ConfigMap
    metadata:
      name: appointment-service-config
    data:
      CORS_ORIGIN: "http://localhost:3000"
      REQUEST_TIMEOUT_MS: "5000"
      DOCTOR_SERVICE_URL: "http://doctor-service:3003"
      PAYMENT_SERVICE_URL: "http://payment-service:3004"
      NOTIFICATION_SERVICE_URL: "http://notification-service:3005"
  - apiVersion: v1
    kind: Secret
    metadata:
      name: appointment-service-secret
    type: Opaque
    stringData:
      MONGODB_URI: "mongodb://mongo:27017/appointment-db"
      JWT_ACCESS_SECRET: "access_secret_123456789_secure_key_service"

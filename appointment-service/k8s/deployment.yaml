apiVersion: apps/v1
kind: Deployment
metadata:
  name: appointment-service
  labels:
    app: appointment-service
spec:
  replicas: 2
  selector:
    matchLabels:
      app: appointment-service
  template:
    metadata:
      labels:
        app: appointment-service
    spec:
      containers:
        - name: appointment-service
          image: healthlink-appointment-service:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 4001
          env:
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "4001"
            - name: CORS_ORIGIN
              valueFrom:
                configMapKeyRef:
                  name: appointment-service-config
                  key: CORS_ORIGIN
            - name: REQUEST_TIMEOUT_MS
              valueFrom:
                configMapKeyRef:
                  name: appointment-service-config
                  key: REQUEST_TIMEOUT_MS
            - name: DOCTOR_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: appointment-service-config
                  key: DOCTOR_SERVICE_URL
            - name: TELEMEDICINE_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: appointment-service-config
                  key: TELEMEDICINE_SERVICE_URL
            - name: PAYMENT_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: appointment-service-config
                  key: PAYMENT_SERVICE_URL
            - name: NOTIFICATION_SERVICE_URL
              valueFrom:
                configMapKeyRef:
                  name: appointment-service-config
                  key: NOTIFICATION_SERVICE_URL
            - name: MONGODB_URI
              valueFrom:
                secretKeyRef:
                  name: appointment-service-secret
                  key: MONGODB_URI
            - name: JWT_ACCESS_SECRET
              valueFrom:
                secretKeyRef:
                  name: appointment-service-secret
                  key: JWT_ACCESS_SECRET
          readinessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 10
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: 4001
            initialDelaySeconds: 20
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "500m"
              memory: "512Mi"

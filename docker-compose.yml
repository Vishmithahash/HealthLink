services:
  mongo:
    image: mongo:7
    container_name: healthlink-mongo
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db
    healthcheck:
      test: ["CMD", "mongosh", "--quiet", "--eval", "db.adminCommand('ping').ok"]
      interval: 10s
      timeout: 5s
      retries: 10

  auth-service:
    build:
      context: ./auth-service
    image: healthlink-auth-service:local
    container_name: healthlink-auth-service
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "4000:4000"
    env_file:
      - ./auth-service/.env
    environment:
      NODE_ENV: development
      PORT: 4000
      DOCTOR_SERVICE_URL: http://doctor-service:4002
      PATIENT_SERVICE_URL: http://patient-service:4003
      INTERNAL_SERVICE_API_KEY: healthlink-internal-key
      REQUEST_TIMEOUT_MS: 5000

  appointment-service:
    build:
      context: ./appointment-service
    image: healthlink-appointment-service:local
    container_name: healthlink-appointment-service
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      auth-service:
        condition: service_started
    ports:
      - "4001:4001"
    env_file:
      - ./appointment-service/.env
    environment:
      NODE_ENV: development
      PORT: 4001
      ALLOW_DOCTOR_FALLBACK: "true"
      DOCTOR_SERVICE_URL: http://doctor-service:4002
      TELEMEDICINE_SERVICE_URL: http://telemedicine-service:4004
      PAYMENT_SERVICE_URL: http://host.docker.internal:3004
      NOTIFICATION_SERVICE_URL: http://host.docker.internal:3005
      REQUEST_TIMEOUT_MS: 5000

  telemedicine-service:
    build:
      context: ./telemedicine-service
    image: healthlink-telemedicine-service:local
    container_name: healthlink-telemedicine-service
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      appointment-service:
        condition: service_started
    ports:
      - "4004:4004"
    env_file:
      - ./telemedicine-service/.env
    environment:
      NODE_ENV: development
      PORT: 4004
      JWT_SECRET: access_secret_123456789_secure_key_service
      APPOINTMENT_SERVICE_URL: http://appointment-service:4001
      VERIFY_APPOINTMENT_WITH_SERVICE: "true"
      ALLOW_APPOINTMENT_FALLBACK: "false"
      JITSI_DOMAIN: meet.jit.si
      CORS_ORIGIN: http://localhost:3000
      REQUEST_TIMEOUT_MS: 5000

  ai-service:
    build:
      context: ./ai-service
    image: healthlink-ai-service:local
    container_name: healthlink-ai-service
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      auth-service:
        condition: service_started
    ports:
      - "4005:4005"
    env_file:
      - ./ai-service/.env
    environment:
      NODE_ENV: development
      PORT: 4005
      JWT_SECRET: access_secret_123456789_secure_key_service
      COHERE_MODEL: command-a-03-2025
      CORS_ORIGIN: http://localhost:3000
      RATE_LIMIT_WINDOW_MS: 60000
      RATE_LIMIT_MAX_REQUESTS: 10
      REQUEST_TIMEOUT_MS: 10000

  doctor-service:
    build:
      context: ./doctor-service
    image: healthlink-doctor-service:local
    container_name: healthlink-doctor-service
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
      telemedicine-service:
        condition: service_started
    ports:
      - "4002:4002"
    env_file:
      - ./doctor-service/.env
    environment:
      NODE_ENV: development
      PORT: 4002
      MONGODB_URI: mongodb://mongo:27017/doctor-db
      JWT_ACCESS_SECRET: access_secret_123456789_secure_key_service
      AUTH_SERVICE_URL: http://auth-service:4000
      INTERNAL_SERVICE_API_KEY: healthlink-internal-key
      APPOINTMENT_SERVICE_URL: http://appointment-service:4001
      PATIENT_SERVICE_URL: http://patient-service:4003
      TELEMEDICINE_SERVICE_URL: http://telemedicine-service:4004
      AI_SERVICE_URL: http://ai-service:4005
      NOTIFICATION_SERVICE_URL: http://host.docker.internal:4005
      REQUEST_TIMEOUT_MS: 5000

  patient-service:
    build:
      context: ./patient-service
    image: healthlink-patient-service:local
    container_name: healthlink-patient-service
    restart: unless-stopped
    depends_on:
      mongo:
        condition: service_healthy
    ports:
      - "4003:4003"
    env_file:
      - ./patient-service/.env
    environment:
      NODE_ENV: development
      PORT: 4003
      MONGODB_URI: mongodb://mongo:27017/patient-db
      JWT_ACCESS_SECRET: access_secret_123456789_secure_key_service
      AUTH_SERVICE_URL: http://auth-service:4000
      INTERNAL_SERVICE_API_KEY: healthlink-internal-key
      AI_SERVICE_URL: http://ai-service:4005
      CORS_ORIGIN: http://localhost:3000
      MAX_REPORT_SIZE_MB: 10

volumes:
  mongo_data:
